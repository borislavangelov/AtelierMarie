# Atelier Marie — Nginx Rate Limiting Configuration
#
# Include this file in the main nginx.conf via:
#   include /etc/nginx/conf.d/ratelimit.conf;
#
# Rate limiting protects authentication and checkout endpoints from abuse.
# Other endpoints use a more generous limit to prevent scraping.

# --- Rate Limit Zones ---
# Zone: auth — strict limit for login/OAuth endpoints
# 5 requests per second per IP, burst of 10
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# Zone: checkout — strict limit for order creation
# 2 requests per second per IP, burst of 5
limit_req_zone $binary_remote_addr zone=checkout:10m rate=2r/s;

# Zone: api_general — general API rate limit
# 30 requests per second per IP, burst of 60
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;

# Zone: admin — admin endpoints (already behind auth, but protect against brute-force)
# 10 requests per second per IP, burst of 20
limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/s;

# --- Standard 429 response ---
limit_req_status 429;

